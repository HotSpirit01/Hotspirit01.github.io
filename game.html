<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<audio src="audio/tap.wav" id="tapaud"></audio>

<body>
    <p id="money">Money:</p>
    <p id="upgr">Click Upgrades:</p>
    <p id="error" style="color: red"></p>
    <div class = "container" style="position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);">
    <button style="width: 200px; height: 50px;" type = "button" name="click" id="click" onclick="count(); document.getElementById('tapaud').play()">Click</button>

    <button type = "button" name = "clickUpgrade" id="clku" onclick="clku()" style="width: 200px; height: 50px; position: absolute;
  top: 50%;

  <button type = "button" name = "passUpgrade" id="pass" onclick="pass()" style="width: 200px; height: 50px; position: absolute;
  top: 50%;
  left: 25%;
  transform: translate(-50%, -50%);" id="pass" onclick="pass()">Passive income</button>
  <button type = "button" name = "timeupg" id="timeupg" onclick="minust()" style="width: 200px; height: 50px; position: absolute;
  top: 40%;
  left: 25%;
  transform: translate(-50%, -50%);" id="pass" onclick="pass()">-time</button>
